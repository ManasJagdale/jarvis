<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Jarvis</title>
<style>
  :root {
    --bg: #0e1113;
    --panel: #171b1e;
    --border: #262b2f;
    --text: #e8e6e1;
    --text-dim: #8a8f94;
    --accent: #5fa8d3;
    --danger: #d3695f;
    --mono: 'SF Mono', 'Consolas', 'Menlo', monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* ---- Login screen ---- */
  #login-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    gap: 16px;
  }
  #login-screen h1 {
    font-family: var(--mono);
    font-weight: 600;
    letter-spacing: 0.02em;
    font-size: 22px;
    margin: 0 0 8px;
  }
  #login-screen input {
    width: 100%;
    max-width: 320px;
    padding: 14px 16px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    font-size: 16px;
  }
  #login-screen button {
    width: 100%;
    max-width: 320px;
    padding: 14px 16px;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: #08171f;
    font-weight: 600;
    font-size: 16px;
  }
  #login-error { color: var(--danger); font-size: 14px; min-height: 18px; }

  /* ---- Chat screen ---- */
  #chat-screen { flex: 1; display: none; flex-direction: column; min-height: 0; }
  #topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }
  #topbar .title { font-family: var(--mono); font-weight: 600; }
  #status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-dim); display: inline-block; margin-right: 8px; }
  #status-dot.connected { background: #6fbf73; }
  #clear-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 13px;
  }
  .msg.diagnostic { align-self: center; font-family: var(--mono); font-size: 12px; color: #c99a4a; text-align: center; }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .msg { max-width: 88%; padding: 10px 14px; border-radius: 14px; line-height: 1.4; white-space: pre-wrap; word-break: break-word; }
  .msg.user { align-self: flex-end; background: var(--accent); color: #08171f; border-bottom-right-radius: 4px; }
  .msg.assistant { align-self: flex-start; background: var(--panel); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .msg.tool {
    align-self: flex-start;
    font-family: var(--mono);
    font-size: 12.5px;
    color: var(--text-dim);
    background: none;
    border: none;
    padding: 2px 4px;
  }
  .msg.system { align-self: center; font-size: 12.5px; color: var(--text-dim); }

  #composer {
    display: flex;
    gap: 8px;
    padding: 12px;
    border-top: 1px solid var(--border);
  }
  #composer textarea {
    flex: 1;
    resize: none;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text);
    padding: 10px 12px;
    font-size: 16px;
    max-height: 120px;
  }
  #composer button {
    border: none;
    border-radius: 10px;
    padding: 0 18px;
    font-weight: 600;
    font-size: 15px;
  }
  #send-btn { background: var(--accent); color: #08171f; }
  #stop-btn { background: var(--danger); color: #1a0a08; display: none; }

  /* ---- Confirm modal ---- */
  #confirm-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    align-items: flex-end;
    justify-content: center;
    z-index: 10;
  }
  #confirm-box {
    width: 100%;
    max-width: 480px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px 16px 0 0;
    padding: 20px;
  }
  #confirm-box h2 { margin: 0 0 10px; font-size: 15px; color: var(--danger); }
  #confirm-desc { font-family: var(--mono); font-size: 13.5px; white-space: pre-wrap; color: var(--text); margin-bottom: 16px; }
  #confirm-actions { display: flex; gap: 10px; }
  #confirm-actions button { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: 600; font-size: 15px; }
  #confirm-yes { background: var(--danger); color: #1a0a08; }
  #confirm-no { background: var(--border); color: var(--text); }
</style>
</head>
<body>

  <!-- LOGIN -->
  <div id="login-screen">
    <h1>Jarvis</h1>
    <input id="password-input" type="password" placeholder="Password" autocomplete="current-password">
    <button id="login-btn">Log in</button>
    <div id="login-error"></div>
  </div>

  <!-- CHAT -->
  <div id="chat-screen">
    <div id="topbar">
      <div class="title"><span id="status-dot"></span>Jarvis</div>
      <button id="clear-btn" title="Start a fresh conversation">Clear</button>
    </div>
    <div id="messages"></div>
    <div id="composer">
      <textarea id="text-input" rows="1" placeholder="Message Jarvis..."></textarea>
      <button id="send-btn">Send</button>
      <button id="stop-btn">Stop</button>
    </div>
  </div>

  <!-- CONFIRM MODAL -->
  <div id="confirm-overlay">
    <div id="confirm-box">
      <h2>Jarvis wants to do the following</h2>
      <div id="confirm-desc"></div>
      <div id="confirm-actions">
        <button id="confirm-no">Cancel</button>
        <button id="confirm-yes">Confirm</button>
      </div>
    </div>
  </div>

<script>
  const TOKEN_KEY = 'jarvis_token';
  let ws = null;
  let turnRunning = false;

  const loginScreen = document.getElementById('login-screen');
  const chatScreen = document.getElementById('chat-screen');
  const messagesEl = document.getElementById('messages');
  const statusDot = document.getElementById('status-dot');
  const sendBtn = document.getElementById('send-btn');
  const stopBtn = document.getElementById('stop-btn');
  const textInput = document.getElementById('text-input');
  const confirmOverlay = document.getElementById('confirm-overlay');
  const confirmDesc = document.getElementById('confirm-desc');

  function addMessage(role, text) {
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  function setTurnRunning(running) {
    turnRunning = running;
    sendBtn.style.display = running ? 'none' : 'block';
    stopBtn.style.display = running ? 'block' : 'none';
  }

  function renderHistory(messages) {
    messagesEl.innerHTML = '';
    for (const m of messages) {
      if (m.role === 'user') addMessage('user', m.content);
      else if (m.role === 'assistant' && m.content) addMessage('assistant', m.content);
      else if (m.role === 'tool') addMessage('tool', `${m.name} -> ${m.content}`);
    }
  }

  function connect(token) {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}/ws?token=${encodeURIComponent(token)}`);

    ws.onopen = () => { statusDot.classList.add('connected'); };
    ws.onclose = () => {
      statusDot.classList.remove('connected');
      // Simple reconnect loop -- a dropped connection doesn't cancel the
      // turn server-side, so just try to get back in.
      setTimeout(() => connect(token), 2000);
    };

    ws.onmessage = (evt) => {
      const data = JSON.parse(evt.data);
      switch (data.type) {
        case 'history':
          renderHistory(data.messages);
          break;
        case 'tool_start':
          addMessage('tool', `Running ${data.name}...`);
          break;
        case 'tool_end':
          addMessage('tool', `${data.name} -> ${data.result}`);
          break;
        case 'answer':
          setTurnRunning(false);
          addMessage('assistant', data.text);
          break;
        case 'stopped':
          setTurnRunning(false);
          addMessage('system', 'Stopped.');
          break;
        case 'busy':
          addMessage('system', "Jarvis is still working on the last thing -- wait or hit Stop.");
          break;
        case 'assistant_text':
          addMessage('assistant', data.text);
          break;
        case 'diagnostic':
          addMessage('diagnostic', data.message);
          break;
        case 'error':
          setTurnRunning(false);
          addMessage('system', 'Error: ' + data.message);
          break;
        case 'confirm_request':
          confirmDesc.textContent = data.description;
          confirmOverlay.style.display = 'flex';
          confirmOverlay.dataset.id = data.id;
          break;
      }
    };
  }

  function sendMessage() {
    const text = textInput.value.trim();
    if (!text || turnRunning) return;
    addMessage('user', text);
    ws.send(JSON.stringify({ type: 'message', text }));
    textInput.value = '';
    setTurnRunning(true);
  }

  sendBtn.onclick = sendMessage;
  textInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  stopBtn.onclick = () => { ws.send(JSON.stringify({ type: 'stop' })); };

  document.getElementById('confirm-yes').onclick = () => {
    ws.send(JSON.stringify({ type: 'confirm', id: confirmOverlay.dataset.id, approved: true }));
    confirmOverlay.style.display = 'none';
  };
  document.getElementById('confirm-no').onclick = () => {
    ws.send(JSON.stringify({ type: 'confirm', id: confirmOverlay.dataset.id, approved: false }));
    confirmOverlay.style.display = 'none';
  };

  document.getElementById('clear-btn').onclick = async () => {
    const token = localStorage.getItem(TOKEN_KEY);
    if (!token) return;
    if (!confirm('Start a fresh conversation? This clears the current history.')) return;
    try {
      const res = await fetch('/clear', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token }),
      });
      if (res.ok) {
        messagesEl.innerHTML = '';
      } else {
        const data = await res.json();
        addMessage('system', 'Could not clear: ' + (data.error || 'unknown error'));
      }
    } catch (e) {
      addMessage('system', 'Could not reach the server to clear.');
    }
  };

  function showChat() {
    loginScreen.style.display = 'none';
    chatScreen.style.display = 'flex';
  }

  document.getElementById('login-btn').onclick = async () => {
    const password = document.getElementById('password-input').value;
    const errorEl = document.getElementById('login-error');
    errorEl.textContent = '';
    try {
      const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password, device_label: navigator.userAgent.slice(0, 40) }),
      });
      if (!res.ok) {
        errorEl.textContent = 'Incorrect password.';
        return;
      }
      const data = await res.json();
      localStorage.setItem(TOKEN_KEY, data.token);
      showChat();
      connect(data.token);
    } catch (e) {
      errorEl.textContent = 'Could not reach the server.';
    }
  };

  // Auto-login if we already have a persistent token from a previous visit.
  const existingToken = localStorage.getItem(TOKEN_KEY);
  if (existingToken) {
    showChat();
    connect(existingToken);
  }
</script>
</body>
</html>
